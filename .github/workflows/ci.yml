name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      deploy: ${{ steps.filter.outputs.deploy }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            deploy:
              - '**'
              - '!README.md'
              - '!docs/**'

  notify-start:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.changes.outputs.deploy == 'true'
    needs: [changes]
    uses: shulzpavel/planning-poker-dev/.github/workflows/ci-notify-start.yml@main
    with:
      service_label: jira-service
    secrets:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install -r requirements.txt
      - run: PYTHONPATH=. python -m pytest -q -p no:cacheprovider
      - run: PYTHONPATH=. python -m compileall -q services app config.py jira_fields.py

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t planning-poker-jira-service .
      - name: Verify planning_poker_common import in image
        run: |
          docker run --rm planning-poker-jira-service python -c \
            "import planning_poker_common; print('planning_poker_common OK')"

  deploy:
    name: Deploy jira-service to production
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.changes.outputs.deploy == 'true'
    needs: [test, docker, changes]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Deploy on server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script_stop: true
          command_timeout: 20m
          script: |
            set -euo pipefail
            cd /opt/planning-poker-dev
            export DEPLOY_TRIGGER="github:${{ github.repository }}@${{ github.sha }}"
            ./infra/deploy/deploy-service-prod.sh jira-service

  notify-result:
    if: always() && !cancelled() && (needs.changes.outputs.deploy == 'true' || needs.test.result == 'failure' || needs.docker.result == 'failure')
    needs: [test, docker, deploy, changes]
    uses: shulzpavel/planning-poker-dev/.github/workflows/ci-notify-result.yml@main
    with:
      service_label: jira-service
      test_result: ${{ needs.test.result }}
      docker_result: ${{ needs.docker.result }}
      deploy_result: ${{ needs.deploy.result }}
      notify_on_success: true
    secrets:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
